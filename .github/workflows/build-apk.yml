name: 🤖 Build Android APK

  on:
    push:
      branches: [ main ]
    pull_request:
      branches: [ main ]
    workflow_dispatch:

  jobs:
    build-apk:
      name: Build APK
      runs-on: ubuntu-latest

      steps:
        - name: 📥 Checkout code
          uses: actions/checkout@v4

        - name: ⚙️ Setup Node.js 20
          uses: actions/setup-node@v4
          with:
            node-version: '20'
            cache: 'npm'

        - name: 📦 Install dependencies
          run: npm ci

        - name: 🏗️ Build web app
          env:
            VITE_API_URL: ${{ secrets.VITE_API_URL }}
          run: npm run build

        - name: ☕ Setup Java 21
          uses: actions/setup-java@v4
          with:
            distribution: 'temurin'
            java-version: '21'

        - name: 📱 Setup Android SDK
          uses: android-actions/setup-android@v3

        - name: ➕ Add Android platform
          run: |
            if [ ! -d "android" ]; then
              npx cap add android
            fi

        - name: 🎨 Generate app icons
          run: |
            sudo apt-get install -y imagemagick
            ICON=public/icon/logo.png
            if [ ! -f "$ICON" ]; then
              echo "Creating default icon..."
              convert -size 512x512 xc:#3b82f6 -fill white -font DejaVu-Sans-Bold \
                -pointsize 200 -gravity center -annotate 0 'M' \
                "$ICON"
            fi
            declare -A SIZES=(
              ["mdpi"]=48 ["hdpi"]=72 ["xhdpi"]=96
              ["xxhdpi"]=144 ["xxxhdpi"]=192
            )
            for DPI in "${!SIZES[@]}"; do
              SIZE=${SIZES[$DPI]}
              DIR=android/app/src/main/res/mipmap-$DPI
              mkdir -p $DIR
              convert "$ICON" -resize ${SIZE}x${SIZE}! $DIR/ic_launcher.png
              # Round icon with circular mask
              convert "$ICON" -resize ${SIZE}x${SIZE}! \
                \( +clone -threshold -1 -fill black -colorize 100 \
                   -fill white -draw "circle $((SIZE/2)),$((SIZE/2)) $((SIZE/2)),0" \) \
                -alpha off -compose CopyOpacity -composite $DIR/ic_launcher_round.png
            done
            # Foreground icon for adaptive icons
            convert "$ICON" -resize 108x108 android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_foreground.png 2>/dev/null || true
            echo "✅ Icons generated!"

        - name: 🔄 Sync Capacitor
          run: npx cap sync android

        - name: 🔧 Make Gradle executable
          run: chmod +x android/gradlew

        - name: 🏗️ Build Debug APK
          working-directory: android
          run: ./gradlew assembleDebug --no-daemon --stacktrace

        - name: 📤 Upload APK artifact
          uses: actions/upload-artifact@v4
          with:
            name: memegram-debug-apk
            path: android/app/build/outputs/apk/debug/app-debug.apk
            retention-days: 30

        - name: 📋 APK Info
          run: |
            APK=android/app/build/outputs/apk/debug/app-debug.apk
            if [ -f "$APK" ]; then
              SIZE=$(du -sh "$APK" | cut -f1)
              echo "✅ APK built successfully!"
              echo "📦 Size: $SIZE"
            fi
  